<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Save Video • MoTrend©</title>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <style>
@font-face{font-family:"Coolvetica";src:url("/fonts/CoolveticaRg-Regular.woff") format("woff");font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:"Coolvetica";src:url("/fonts/CoolveticaRg-Bold.woff") format("woff");font-weight:700;font-style:normal;font-display:swap;}

:root{
  --bg:#0b0b0b;
  --card:#151515;
  --border:#2a2a2a;
  --text:#ffffff;
  --muted:rgba(255,255,255,.72);
  --accent:#8BFFB0;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Coolvetica", Arial, sans-serif;
  font-size:19px;
}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;}
h1{margin:0 0 6px;font-size:44px;line-height:1;}
.muted{color:var(--muted);font-size:18px;}
.videoWrap{margin-top:14px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#000;}
video{width:100%;display:block;max-height:68vh;background:#000;}
.actions{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.btn,.btn2,.btn3{
  width:100%;
  min-height:56px;
  padding:0 14px;
  border-radius:12px;
  border:1px solid transparent;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:24px;
  cursor:pointer;
}
.btn{background:var(--accent);color:#0b0b0b;border-color:#6edc97;font-weight:700;}
.btn2{background:#fff;color:#000;}
.btn3{background:#2a2a2a;color:#fff;}
.status{margin-top:10px;font-size:18px;color:var(--muted);min-height:24px;}
.error{margin-top:10px;color:#f87171;font-size:18px;display:none;}
.spinner{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid #3a3a3a;
  border-top-color:#7a7a7a;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MoTrend©</h1>
    <div class="muted">Save your generated video.</div>

    <div class="card" style="margin-top:12px">
      <div class="videoWrap">
        <video id="videoEl" controls playsinline preload="metadata"></video>
      </div>

      <div class="actions">
        <button id="btnSaveVideo" class="btn">Save video</button>
        <a id="btnOpenBrowser" class="btn2" href="#" target="_blank" rel="noopener noreferrer">Open in browser</a>
        <button id="btnCopyLink" class="btn3">Copy link</button>
      </div>

      <div id="status" class="status"></div>
      <div id="error" class="error"></div>
      <div class="muted" style="margin-top:8px">On iPhone choose “Save Video” in the share menu.</div>
    </div>
  </div>

  <script>
    function safeUrl(value) {
      if (typeof value !== "string") return "";
      const trimmed = value.trim();
      if (!trimmed) return "";
      try {
        const url = new URL(trimmed, window.location.origin);
        if (url.protocol !== "http:" && url.protocol !== "https:") return "";
        return url.toString();
      } catch {
        return "";
      }
    }

    function setStatus(message) {
      const el = document.getElementById("status");
      if (el) el.textContent = message || "";
    }

    function setError(message) {
      const el = document.getElementById("error");
      if (!el) return;
      if (!message) {
        el.textContent = "";
        el.style.display = "none";
        return;
      }
      el.textContent = message;
      el.style.display = "block";
    }

    function canShareFile() {
      return (
        typeof navigator !== "undefined" &&
        typeof navigator.share === "function" &&
        typeof File !== "undefined"
      );
    }

    function fileNameFromJobId(jobId) {
      if (typeof jobId !== "string" || !jobId.trim()) {
        return "motrend-video.mp4";
      }
      const safe = jobId.trim().replace(/[^\w-]/g, "");
      return "motrend-" + safe + ".mp4";
    }

    async function shareVideo(downloadUrl, jobId) {
      const response = await fetch(downloadUrl, {method: "GET"});
      if (!response.ok) {
        throw new Error("Could not load video file for sharing.");
      }
      const blob = await response.blob();
      const type = (
        typeof blob.type === "string" &&
        blob.type.startsWith("video/")
      ) ? blob.type : "video/mp4";
      const file = new File([blob], fileNameFromJobId(jobId), {type});

      if (
        typeof navigator.canShare === "function" &&
        !navigator.canShare({files: [file]})
      ) {
        throw new Error("Share with video file is not supported here.");
      }

      await navigator.share({
        files: [file],
        title: "MoTrend video",
      });
    }

    const params = new URLSearchParams(window.location.search);
    const downloadUrl = safeUrl(params.get("url") || "");
    const jobId = params.get("jobId") || "";

    const videoEl = document.getElementById("videoEl");
    const btnSaveVideo = document.getElementById("btnSaveVideo");
    const btnOpenBrowser = document.getElementById("btnOpenBrowser");
    const btnCopyLink = document.getElementById("btnCopyLink");

    if (!downloadUrl) {
      setError("Invalid or missing video URL.");
      if (btnSaveVideo) btnSaveVideo.disabled = true;
      if (btnOpenBrowser) btnOpenBrowser.setAttribute("href", "#");
      if (btnCopyLink) btnCopyLink.disabled = true;
    } else {
      if (videoEl) videoEl.src = downloadUrl;
      if (btnOpenBrowser) btnOpenBrowser.setAttribute("href", downloadUrl);
    }

    if (btnCopyLink) {
      btnCopyLink.onclick = async () => {
        if (!downloadUrl) return;
        setError("");
        try {
          await navigator.clipboard.writeText(downloadUrl);
          setStatus("Link copied.");
        } catch {
          setError("Unable to copy link.");
        }
      };
    }

    if (btnSaveVideo) {
      btnSaveVideo.onclick = async () => {
        if (!downloadUrl) return;
        setError("");
        setStatus("");

        if (!canShareFile()) {
          setError("Share is unavailable. Use Open in browser.");
          return;
        }

        btnSaveVideo.disabled = true;
        btnSaveVideo.innerHTML = '<span class="spinner"></span>Preparing...';

        try {
          await shareVideo(downloadUrl, jobId);
          setStatus("Choose “Save Video” in the share menu.");
        } catch (error) {
          const message = (error && error.message) ?
            error.message :
            "Could not open share menu. Use Open in browser.";
          setError(message);
        } finally {
          btnSaveVideo.disabled = false;
          btnSaveVideo.textContent = "Save video";
        }
      };
    }
  </script>
</body>
</html>
