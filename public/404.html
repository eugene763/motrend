<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found — MoTrend</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: "Coolvetica", Arial, sans-serif; background: #0b0b0b; color: #fff; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .box { background: #151515; border: 1px solid #2a2a2a; border-radius: 16px; padding: 32px; max-width: 360px; text-align: center; }
      .box h1 { font-size: 1.25rem; color: rgba(255,255,255,.7); font-weight: 400; margin: 0 0 8px; }
      .box .code { font-size: 3rem; font-weight: 700; color: #8BFFB0; margin: 0 0 16px; }
      .box p { margin: 0 0 24px; line-height: 1.5; color: rgba(255,255,255,.8); }
      .box a { display: inline-block; background: #fff; color: #000; padding: 12px 20px; border-radius: 12px; text-decoration: none; font-weight: 600; }
      .box a:hover { opacity: .9; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Page not found</h1>
      <div class="code">404</div>
      <p>The page you’re looking for doesn’t exist or was moved.</p>
      <a href="/">Back to MoTrend</a>
    </div>
  </body>
</html>
