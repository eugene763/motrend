<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MoTrend</title>

  <style>
    /* Fonts (Tilda: Coolvetica) */
    @font-face{
      font-family: "Coolvetica";
      src: url("/fonts/CoolveticaRg-Regular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face{
      font-family: "Coolvetica";
      src: url("/fonts/CoolveticaRg-Bold.woff") format("woff");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root{
      --t-text-font: "Coolvetica", Arial, sans-serif;
      --t-title-font: "Coolvetica", Arial, sans-serif;
      --bg: #0b0b0b;
      --card: #151515;
      --border: #2a2a2a;
      --text: #ffffff;
      --muted: rgba(255,255,255,.7);
    }

    body{
      font-family: var(--t-text-font);
      margin:0;
      background: var(--bg);
      color: var(--text);
    }

    h1,h2,h3{ font-family: var(--t-title-font); }

    .wrap{max-width:900px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:12px 0}
    button{border:0;border-radius:12px;padding:12px 14px;font-weight:600;cursor:pointer}
    .btn{background:#fff;color:#000}
    .btn2{background:var(--border);color:#fff}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    img{width:100%;border-radius:12px;display:block}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:#0f0f0f;color:#fff}

    .muted{opacity:.7;font-size:13px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    a{color:#fff}
  </style>
</head>

<body>
  <div class="wrap">
    <h1 style="margin:0 0 6px">MoTrend</h1>
    <div class="muted">Make trends in minutes.</div>

    <div id="auth" class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div style="font-weight:700">Sign in</div>
          <div class="muted">Use Google to continue.</div>
        </div>
        <button id="btnLogin" class="btn">Continue with Google</button>
      </div>
    </div>

    <div id="app" style="display:none">
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <div>
            <div id="userLine" style="font-weight:700"></div>
            <div class="muted">Credits: <span id="credits">0</span> • Country: <span id="country">—</span> • Language: <span id="lang">—</span></div>
          </div>
          <div class="row">
            <button id="btnWallet" class="btn2">Buy credits</button>
            <button id="btnLogout" class="btn2">Log out</button>
          </div>
        </div>
      </div>

      <div id="onboarding" class="card" style="display:none">
        <div style="font-weight:700;margin-bottom:8px">Quick setup</div>
        <div class="grid">
          <div>
            <div class="muted">Country</div>
            <select id="inpCountry">
              <option value="US">United States</option>
              <option value="IN">India</option>
              <option value="GE">Georgia</option>
              <option value="RU">Russia</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div>
            <div class="muted">Language</div>
            <select id="inpLang">
              <option value="en">English</option>
              <option value="ru">Russian</option>
              <option value="hi">Hindi</option>
              <option value="es">Spanish</option>
            </select>
          </div>
        </div>
        <div style="margin-top:10px" class="row">
          <button id="btnSaveProfile" class="btn">Save</button>
          <div class="muted">You can change later.</div>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">Templates</div>
        <div id="templates" class="grid"></div>
        <div class="muted" style="margin-top:8px">Tip: full-body photo works best.</div>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">Generate</div>
        <div class="grid">
          <div>
            <div class="muted">Selected template</div>
            <input id="selTemplate" disabled placeholder="Choose a template above"/>
          </div>
          <div>
            <div class="muted">Upload photo</div>
            <input id="filePhoto" type="file" accept="image/*"/>
          </div>
        </div>
        <div style="margin-top:10px" class="row">
          <button id="btnGenerate" class="btn">Generate</button>
          <div id="status" class="muted"></div>
        </div>
        <div id="result" style="margin-top:12px;display:none">
          <a id="downloadLink" class="btn" style="display:inline-block;text-decoration:none" target="_blank">Download video</a>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">Jobs</div>
        <div id="jobs" class="muted">No jobs yet.</div>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
