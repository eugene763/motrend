<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MoTrend© Video</title>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <style>
    @font-face{font-family:"Coolvetica";src:url("/fonts/CoolveticaRg-Regular.woff") format("woff");font-weight:400;font-style:normal;font-display:swap;}
    @font-face{font-family:"Coolvetica";src:url("/fonts/CoolveticaRg-Bold.woff") format("woff");font-weight:700;font-style:normal;font-display:swap;}
    :root{
      --t-text-font:"Coolvetica", Arial, sans-serif;
      --bg:#0b0b0b;
      --card:#151515;
      --border:#2a2a2a;
      --text:#fff;
      --muted:rgba(255,255,255,.7);
      --accent:#8BFFB0;
    }
    *{box-sizing:border-box;font-family:var(--t-text-font)}
    body{margin:0;background:var(--bg);color:var(--text);font-size:20px}
    .wrap{max-width:780px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
    h1{margin:0 0 10px;font-size:42px}
    .muted{opacity:.78;font-size:18px}
    .brandLink{color:inherit;text-decoration:none}
    .brandLink:hover{opacity:.92}
    .inlineLink{color:var(--accent);text-decoration:none}
    .inlineLink:hover{text-decoration:underline}
    .videoWrap{margin-top:14px;border-radius:14px;overflow:hidden;background:#000;border:1px solid #202020}
    video{display:block;width:100%;max-height:70vh;background:#000}
    .actions{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .btn,.btnGhost{width:100%;min-height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:32px;line-height:1;font-weight:700;padding:0 12px;border:0;cursor:pointer}
    .btn{background:var(--accent);color:#000;border:1px solid #6edc97}
    .btnGhost{background:#2a2a2a;color:#fff}
    .note{margin-top:10px;font-size:18px;opacity:.78}
    .error{color:#f87171;font-size:18px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a class="brandLink" href="/?utm_source=motend_2_nd_page_save"><h1>MoTrend©</h1></a>
      <div class="muted">Click <a class="inlineLink" href="/?utm_source=motend_2_nd_page_save">here</a> to make your own video.</div>
      <div id="error" class="error" style="display:none;margin-top:12px"></div>
      <div class="videoWrap" id="videoWrap" style="display:none">
        <video id="video" controls playsinline></video>
      </div>
      <div class="actions" id="actions" style="display:none">
        <a id="btnSaveFile" class="btn" href="#" download rel="noopener noreferrer">Save file</a>
        <button id="btnCopy" class="btnGhost" type="button">Copy URL</button>
        <button id="btnShare" class="btnGhost" type="button">Share</button>
      </div>
      <div class="note">If download does not start, tap <b>Copy URL</b> and open it in another browser.</div>
    </div>
  </div>

  <script>
    (function() {
      function safeUrl(value) {
        if (typeof value !== 'string') return '';
        var trimmed = value.trim();
        if (!trimmed) return '';
        try {
          var url = new URL(trimmed, window.location.origin);
          if (url.protocol !== 'http:' && url.protocol !== 'https:') return '';
          var isFirebaseDownloadHost = url.hostname === 'firebasestorage.googleapis.com';
          var bucketMatch = /^\/v0\/b\/gen-lang-client-0651837818\.firebasestorage\.app\/o\//.test(url.pathname);
          var hasToken = !!(url.searchParams.get('token') || '').trim();
          if (!isFirebaseDownloadHost || !bucketMatch || !hasToken) return '';
          return url.toString();
        } catch {
          return '';
        }
      }

      var params = new URLSearchParams(window.location.search);
      var videoUrl = safeUrl(params.get('videoUrl') || '');
      var downloadUrl = safeUrl(params.get('downloadUrl') || '');
      var errorEl = document.getElementById('error');
      var videoWrap = document.getElementById('videoWrap');
      var videoEl = document.getElementById('video');
      var actions = document.getElementById('actions');
      var btnSaveFile = document.getElementById('btnSaveFile');
      var btnShare = document.getElementById('btnShare');
      var btnCopy = document.getElementById('btnCopy');

      var pageUrl = window.location.href;
      var copyTargetUrl = downloadUrl || videoUrl || pageUrl;

      if (!videoUrl && !downloadUrl) {
        errorEl.textContent = 'Video URL is missing or invalid.';
        errorEl.style.display = 'block';
        return;
      }

      videoEl.src = videoUrl || downloadUrl;
      if (downloadUrl) {
        btnSaveFile.href = downloadUrl;
      } else if (videoUrl) {
        btnSaveFile.href = videoUrl;
      }

      videoWrap.style.display = 'block';
      actions.style.display = 'flex';

      if (navigator.share) {
        btnShare.addEventListener('click', async function() {
          try {
            await navigator.share({
              title: 'MoTrend© video',
              url: pageUrl,
            });
          } catch (error) {
            if (!error || error.name === 'AbortError') {
              return;
            }
            showTemporaryButtonState(btnShare, 'Share failed', 'Share', 900);
          }
        });
      } else {
        btnShare.style.display = 'none';
      }

      function showTemporaryButtonState(button, label, resetLabel, delay) {
        button.textContent = label;
        button.disabled = true;
        setTimeout(function() {
          button.textContent = resetLabel;
          button.disabled = false;
        }, delay);
      }

      btnCopy.addEventListener('click', async function() {
        try {
          await navigator.clipboard.writeText(copyTargetUrl);
          showTemporaryButtonState(btnCopy, 'URL copied', 'Copy URL', 500);
        } catch {
          btnCopy.textContent = 'Copy failed';
          setTimeout(function() {
            btnCopy.textContent = 'Copy URL';
          }, 800);
        }
      });

      try {
        if (!localStorage.getItem('motrend-save-video-tip-shown')) {
          localStorage.setItem('motrend-save-video-tip-shown', '1');
          setTimeout(function() {
            window.alert(
              'If download does not start, tap Copy URL and open it in another browser.'
            );
          }, 180);
        }
      } catch {
        // no-op
      }
    })();
  </script>
</body>
</html>
